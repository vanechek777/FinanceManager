name: 🍎 Build iOS (Simulator)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-ios:
    name: Build iOS Simulator
    runs-on: macos-latest

    steps:

    - name: ⬇️ Checkout
      uses: actions/checkout@v4

    - name: 🔧 Install .NET 9 SDK (feature band 2xx = Xcode 16.x compatible)
      uses: actions/setup-dotnet@v4
      with:
        # 9.0.3xx устанавливает MAUI iOS SDK 26.x (требует Xcode 26 beta)
        # 9.0.2xx устанавливает MAUI iOS SDK 18.x (работает с Xcode 16.x) ← нужно нам
        dotnet-version: '9.0.2xx'

    - name: 🗑️ Remove .NET 10 SDK
      run: |
        find ~/.dotnet/sdk -maxdepth 1 -mindepth 1 -type d | grep -v '/9\.' | xargs -r rm -rf
        sudo find /usr/local/share/dotnet/sdk -maxdepth 1 -mindepth 1 -type d 2>/dev/null | grep -v '/9\.' | sudo xargs -r rm -rf
        echo "Active SDK: $(dotnet --version)"

    # На macOS runner Xcode 26.x установлен, но xcode-select может указывать на старый (16.x)
    # Находим новейший и переключаемся
    - name: 🏹0️‍♂️ Select latest Xcode
      run: |
        echo "=== Available Xcode versions ==="
        ls /Applications/ | grep -i xcode || echo "None found"
        
        echo "=== Current xcode-select ==="
        xcode-select -p || true
        xcodebuild -version || true
        
        # iOS SDK 26.2.9000 требует ТОЧНО Xcode 26.2 (не 26.3!)
        # Ищем Xcode_26.2.app или Xcode_26.2.0.app
        REQUIRED_XCODE="26.2"
        MATCH=$(ls /Applications/ | grep -E "^Xcode_${REQUIRED_XCODE}" | sort -V | tail -1)

        if [ -n "$MATCH" ]; then
          echo "Selecting: $MATCH"
          sudo xcode-select -s "/Applications/$MATCH/Contents/Developer"
        else
          echo "ERROR: Xcode $REQUIRED_XCODE not found!"
          ls /Applications/ | grep Xcode
          exit 1
        fi

        # Принимаем лицензию (обязательно после смены Xcode на CI)
        sudo xcodebuild -license accept

        echo "=== Active Xcode ==="
        xcodebuild -version

    - name: 📦 Install MAUI workloads
      run: dotnet workload install maui-ios maui-android maui-maccatalyst --skip-sign-check

    # ─────────────────────────────────────────────────────────────────────────
    # КЛЮЧЕВОЕ ИЗМЕНЕНИЕ: НЕ передаём -p:RuntimeIdentifier на командной строке!
    # RuntimeIdentifier каскадируется в FinanceManager.Shared (net9.0) и ломает assets.
    # RuntimeIdentifiers уже прописаны в .csproj для iOS-таргета.
    # ─────────────────────────────────────────────────────────────────────────

    - name: 🔄 Restore (iOS framework only)
      run: |
        dotnet restore FinanceManager/FinanceManager/FinanceManager.csproj \
          -p:TargetFrameworks=net9.0-ios

    - name: 🏗️ Build iOS Simulator
      run: |
        dotnet build FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios \
          --configuration Debug \
          -p:BuildIpa=false \
          -p:CodesignProvision="" \
          -p:CodesignKey="" \
          --verbosity minimal

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FinanceFlow-iOS-Simulator
        path: |
          FinanceManager/FinanceManager/bin/Debug/net9.0-ios/**/*.app
        retention-days: 14
        if-no-files-found: warn
