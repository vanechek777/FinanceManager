{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — FinanceFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'www/css/auth.css' %}" />
</head>
<body>
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">₽</div>
        <span class="logo-text">FinanceFlow</span>
      </div>

      <h1 class="auth-title">Добро пожаловать</h1>
      <p class="auth-subtitle">Войдите в свой аккаунт</p>

      {% if error %}
      <div class="auth-error">
        <span class="error-icon">⚠️</span> {{ error }}
      </div>
      {% endif %}

      <form method="post" class="auth-form" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="username">Имя пользователя</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Введите логин"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Введите пароль"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Показать пароль">👁</button>
          </div>
        </div>

        <button type="submit" class="auth-btn">
          Войти
          <span class="btn-arrow">→</span>
        </button>
      </form>

      <div class="auth-footer">
        Нет аккаунта?
        <a href="{% url 'register' %}" class="auth-link">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('togglePw').addEventListener('click', function () {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    });
  </script>
</body>
</html>
