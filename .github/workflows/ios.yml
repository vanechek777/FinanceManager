name: 📱 Build iOS IPA (Real Device)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-ios-device:
    name: Build iOS IPA for Sideloadly
    runs-on: macos-latest

    steps:

    - name: ⬇️ Checkout
      uses: actions/checkout@v4

    - name: 🔧 Install .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.2xx'

    - name: 🗑️ Remove .NET 10 SDK
      run: |
        find ~/.dotnet/sdk -maxdepth 1 -mindepth 1 -type d | grep -v '/9\.' | xargs -r rm -rf
        sudo find /usr/local/share/dotnet/sdk -maxdepth 1 -mindepth 1 -type d 2>/dev/null | grep -v '/9\.' | sudo xargs -r rm -rf
        echo "Active SDK: $(dotnet --version)"

    - name: 🍎 Setup Xcode 26.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'

    - name: 📦 Install MAUI workloads
      run: dotnet workload install maui-ios maui-android maui-maccatalyst --skip-sign-check

    # Restore Main с указанием RID устройства — создаёт assets для net9.0-ios/ios-arm64
    - name: 🔄 Restore main project (iOS device)
      run: |
        dotnet restore FinanceManager/FinanceManager/FinanceManager.csproj \
          -p:TargetFrameworks=net9.0-ios \
          -p:RuntimeIdentifier=ios-arm64

    # Restore Shared ПОСЛЕДНИМ — восстанавливает plain net9.0 assets
    - name: 🔄 Restore Shared project (last)
      run: |
        dotnet restore FinanceManager/FinanceManager.Shared/FinanceManager.Shared.csproj

    # Сборка для реального устройства с ad-hoc подписью ("-")
    # Ad-hoc подпись позволяет создать .ipa, который Sideloadly переподпишет твоим Apple ID
    - name: 🏗️ Build iOS IPA (ad-hoc signed)
      run: |
        dotnet build FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios \
          --configuration Release \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:BuildIpa=true \
          -p:CodesignKey="-" \
          -p:CodesignProvision="" \
          -p:EnableCodeSigning=false \
          --no-restore \
          --verbosity minimal

    # Ищем .ipa в папке Release
    - name: 🔍 Find IPA file
      run: |
        echo "=== Built files ==="
        find FinanceManager/FinanceManager/bin/Release/net9.0-ios -name "*.ipa" 2>/dev/null || echo "No .ipa found"
        find FinanceManager/FinanceManager/bin/Release/net9.0-ios -name "*.app" -type d 2>/dev/null || echo "No .app found"

    - name: 📤 Upload IPA artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FinanceFlow-iOS-Device
        path: |
          FinanceManager/FinanceManager/bin/Release/net9.0-ios/**/*.ipa
          FinanceManager/FinanceManager/bin/Release/net9.0-ios/**/FinanceManager.app
        retention-days: 14
        if-no-files-found: warn
