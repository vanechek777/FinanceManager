name: 🍎 Build iOS (Simulator)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build for iOS Simulator
    runs-on: macos-latest

    steps:

    - name: ⬇️ Checkout code
      uses: actions/checkout@v4

    # Явно указываем .NET 9 — иначе runner может взять .NET 10
    - name: 🔧 Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Проверяем какой SDK используется
    - name: 🔍 Check .NET version
      run: dotnet --version

    # Устанавливаем ТОЛЬКО iOS workload для .NET 9
    - name: 📦 Install MAUI iOS workload
      run: |
        dotnet workload install maui-ios --sdk-version 9.0.0 --skip-sign-check || \
        dotnet workload install maui-ios --skip-sign-check

    # Восстанавливаем ТОЛЬКО iOS target (не Android, не Windows)
    - name: 🔄 Restore packages (iOS only)
      run: |
        dotnet restore FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios

    # Собираем ТОЛЬКО iOS Simulator (x64)
    - name: 🏗️ Build iOS Simulator
      run: |
        dotnet build FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios \
          --configuration Debug \
          -p:RuntimeIdentifier=iossimulator-x64 \
          -p:BuildIpa=false \
          --no-restore \
          --verbosity minimal

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FinanceFlow-iOS-Simulator
        path: FinanceManager/FinanceManager/bin/Debug/net9.0-ios/iossimulator-x64/**/*.app
        retention-days: 14
        if-no-files-found: warn
