name: 🍎 Build iOS (Simulator)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-ios:
    name: Build iOS Simulator
    runs-on: macos-latest

    steps:

    - name: ⬇️ Checkout
      uses: actions/checkout@v4

    - name: 🔧 Install .NET 9 SDK (feature band 2xx = Xcode 16.x compatible)
      uses: actions/setup-dotnet@v4
      with:
        # 9.0.3xx устанавливает MAUI iOS SDK 26.x (требует Xcode 26 beta)
        # 9.0.2xx устанавливает MAUI iOS SDK 18.x (работает с Xcode 16.x) ← нужно нам
        dotnet-version: '9.0.2xx'

    - name: 🗑️ Remove .NET 10 SDK
      run: |
        find ~/.dotnet/sdk -maxdepth 1 -mindepth 1 -type d | grep -v '/9\.' | xargs -r rm -rf
        sudo find /usr/local/share/dotnet/sdk -maxdepth 1 -mindepth 1 -type d 2>/dev/null | grep -v '/9\.' | sudo xargs -r rm -rf
        echo "Active SDK: $(dotnet --version)"

    # maxim-lobanov/setup-xcode корректно выбирает Xcode и принимает лицензию
    # Обходит проблему stub-пакетов (Xcode_26.2.0.app без macOS SDK)
    - name: 🍎 Setup Xcode 26.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'

    - name: 📦 Install MAUI workloads
      run: dotnet workload install maui-ios maui-android maui-maccatalyst --skip-sign-check

    # ─────────────────────────────────────────────────────────────────────────
    # КЛЮЧЕВОЕ ИЗМЕНЕНИЕ: НЕ передаём -p:RuntimeIdentifier на командной строке!
    # RuntimeIdentifier каскадируется в FinanceManager.Shared (net9.0) и ломает assets.
    # RuntimeIdentifiers уже прописаны в .csproj для iOS-таргета.
    # ─────────────────────────────────────────────────────────────────────────

    # 1. Restore Main — попутно пишет Shared assets в iOS-контексте
    - name: 🔄 Restore main project (iOS only)
      run: |
        dotnet restore FinanceManager/FinanceManager/FinanceManager.csproj \
          -p:TargetFrameworks=net9.0-ios

    # 2. Restore Shared ПОСЛЕДНИМ — перезаписывает assets обратно на plain net9.0
    #    (без этого Main.restore перезатирает их iOS-контекстом)
    - name: 🔄 Restore Shared project (last, overrides to net9.0)
      run: |
        dotnet restore FinanceManager/FinanceManager.Shared/FinanceManager.Shared.csproj

    - name: 🏗️ Build iOS Simulator
      run: |
        dotnet build FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios \
          --configuration Debug \
          -p:RuntimeIdentifier=iossimulator-arm64 \
          -p:BuildIpa=false \
          -p:CodesignProvision="" \
          -p:CodesignKey="" \
          --no-restore \
          --verbosity minimal

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FinanceFlow-iOS-Simulator
        path: |
          FinanceManager/FinanceManager/bin/Debug/net9.0-ios/**/*.app
        retention-days: 14
        if-no-files-found: warn
