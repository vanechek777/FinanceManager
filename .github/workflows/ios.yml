name: 🍎 Build iOS (Simulator)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_MULTILEVEL_LOOKUP: 0      # Запрещает искать .NET в системных путях
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-ios:
    name: Build for iOS Simulator
    runs-on: macos-latest

    steps:

    - name: ⬇️ Checkout
      uses: actions/checkout@v4

    # Удаляем все системные .NET чтобы не было конфликта версий
    - name: 🗑️ Remove system .NET SDK versions
      run: |
        # Оставляем только то что установит setup-dotnet
        if [ -d /usr/local/share/dotnet ]; then
          sudo rm -rf /usr/local/share/dotnet
        fi

    - name: 🔧 Install .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: 🔍 Verify .NET version (must be 9.x)
      run: |
        dotnet --version
        dotnet --list-sdks

    - name: 📦 Install MAUI iOS workload
      run: dotnet workload install maui-ios --skip-sign-check

    - name: 🔄 Restore (iOS target only)
      run: |
        dotnet restore FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios

    - name: 🏗️ Build iOS Simulator
      run: |
        dotnet build FinanceManager/FinanceManager/FinanceManager.csproj \
          --framework net9.0-ios \
          --configuration Debug \
          -p:RuntimeIdentifier=iossimulator-x64 \
          -p:BuildIpa=false \
          --no-restore \
          --verbosity minimal

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FinanceFlow-iOS-Simulator
        path: FinanceManager/FinanceManager/bin/Debug/net9.0-ios/iossimulator-x64/**/*.app
        retention-days: 14
        if-no-files-found: warn
